version: '3.8'

services:
  qrtags:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/qrtags.db
      - NEXT_PUBLIC_BASE_URL=${NEXT_PUBLIC_BASE_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-change-me-in-coolify}
      - NEXTAUTH_URL=${NEXT_PUBLIC_BASE_URL:-http://localhost:3000}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-change-me-in-coolify}
      - WAKIT_API_KEY=${WAKIT_API_KEY:-}
      - WAKIT_BASE_URL=${WAKIT_BASE_URL:-https://api.wakit.ai/v1}
      - WAKIT_PHONE_NUMBER_ID=${WAKIT_PHONE_NUMBER_ID:-}
      - WAKIT_TEMPLATE_SCAN_ALERT=${WAKIT_TEMPLATE_SCAN_ALERT:-baggage_scan_alert}
      - WAKIT_TIMEOUT_MS=${WAKIT_TIMEOUT_MS:-10000}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GROQ_MODEL_CHAT=${GROQ_MODEL_CHAT:-llama3-8b-8192}
      - GROQ_MODEL_ANALYSIS=${GROQ_MODEL_ANALYSIS:-llama3-8b-8192}
      - GROQ_TIMEOUT_MS=${GROQ_TIMEOUT_MS:-30000}
      - GROQ_AI_ENABLED=${GROQ_AI_ENABLED:-true}
      - GROQ_CHAT_ENABLED=${GROQ_CHAT_ENABLED:-true}
      - GROQ_SCAN_GUARD_ENABLED=${GROQ_SCAN_GUARD_ENABLED:-true}
      - GROQ_AUTO_TRANSLATE_ENABLED=${GROQ_AUTO_TRANSLATE_ENABLED:-true}
    volumes:
      - qrtags_data:/app/data
      - qrtags_uploads:/app/public/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  qrtags_data:
  qrtags_uploads: